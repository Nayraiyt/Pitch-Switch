<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pitch-Switch</title>
        <link rel="stylesheet" href="./css/freestyle.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Acme&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <!-- Nav bar go BRRRRRRR -->
            <div class="buttons-box">
                <div class="buttons button-util button-home">
                    <a href="./index.html" class="acme-button button">Home</a>
                </div>

                <div class="buttons button-pages button-freestyle">
                    <a href="./freestyle.html" class="acme-button button">Freestyle</a>
                </div>

                <div class="buttons button-pages button-chordsheet">
                    <button class="acme-button button">Chord</button>
                </div>

                <div class="buttons button-util learn-more">
                    <button class="acme-button button">Help</button>
                </div>
            </div>
        </header>
        <main>
            <form class = "input-box" id="input-box">
                <div class = "input-box-left">
                    <div class = "target-key-input">
                        <label class="prompt-text">Input the Target Key:</label>
                        <input class= "input-area" type="text" id="targetKey">
                    </div>
                    <div class = "start-key-input">
                        <label class="prompt-text">Input your Start Key:</label>
                        <input class= "input-area" type="text" id="startKey">
                    </div>
                </div>
                <div class = "input-box-right">
                    <div class="target-chords-input">
                        <label class="prompt-text">Starting Chord Progression</label>
                        <input class= "input-area" type="text" id="chordsInput" placeholder="ex: C G Am F">
                    </div>
                    <div class = "submit">
                        <input class= "button prompt-text" type="submit" value="Load Key">
                    </div>
                </div>
            </form>

            <div class="title-box" id="titleBox">
                <!-- JS puts the title here -->
            </div>
            <div class="output-box" id="outputBox">
                <!-- JS appends the ending kets here -->
            </div>
        </main>

        <script type="module" src="./js/freestyle.js"></script>
    </body>

</html>
