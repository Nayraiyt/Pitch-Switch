<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pitch-Switch</title>
        <link rel="stylesheet" href="./css/chordsheet.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Acme&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <!-- Nav bar go BRRRRRRR -->
            <div class="buttons-box">
                <div class="buttons button-util button-home">
                    <a href="./index.html" class="acme-button button">Home</a>
                </div>

                <div class="buttons button-pages button-freestyle">
                    <a href="./freestyle.html" class="acme-button button">Freestyle</a>
                </div>

                <div class="buttons button-pages button-chordsheet">
                    <a href="./chordsheet.html" class="acme-button button">Chordsheet</a>
                </div>

                <div class="buttons button-util learn-more">
                    <button class="acme-button button">Help</button>
                </div>
            </div>
        </header>
        <main>
            <form class = "input-box" id="input-box">
                <div class = "input-right">
                    <div class="input-chordsheet">
                        <label class="prompt-text" >Insert Chordsheet (file.txt): </label>
                        <input class = "button prompt-text" type="file" id="txtInput" accept=".txt" />
                    </div>
                </div>
                <div class = "input-left">
                    <div class="input-target-key">
                        <label class="prompt-text">Input the Target Key:</label>
                        <input class = "input-area" type="text" id="targetKey" placeholder="eg. C" />
                    </div>
                    <div class="input-start-key">
                        <label class="prompt-text">Input the Start Key:</label>
                        <input class = "input-area" type="text" id="startKey" placeholder="eg. G" />
                    </div>
                    <button class = "button prompt-text" type="submit">Transpose File</button>
                </div>
            </form>
            <div class = "output-box">
                <pre class = "gen-text" id="output">
                    <!-- JS puts transposed sheet here -->
                </pre>
            </div>

        </main>
        
        <script type="module" src="./js/chordsheet.js"></script>
    </body>

</html>
